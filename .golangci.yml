version: "2"

run:
  timeout: 3m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - misspell

  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (net.Conn).Close

    misspell:
      locale: US

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

      - linters:
          - errcheck
        text: "fmt\\.Fprint"

      - linters:
          - errcheck
        text: "Close\\(\\)"
