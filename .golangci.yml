version: "2"

run:
  timeout: 3m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gocritic
    - misspell
    - bodyclose
    - noctx

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
      disabled-checks:
        - ifElseChain
        - commentedOutCode

    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (net.Conn).Close

    misspell:
      locale: US

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - bodyclose

      - linters:
          - errcheck
        text: "fmt\\.Fprint"

      - linters:
          - errcheck
        text: "\\.Close\\(\\)"

      - linters:
          - gocritic
        text: "octalLiteral|paramTypeCombine|redundantSprint|unlambda|httpNoBody"
