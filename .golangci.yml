version: "2"

run:
  timeout: 3m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - gocritic
    - misspell
    - bodyclose
    - noctx

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks:
        - ifElseChain
        - commentedOutCode

    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (net.Conn).Close

    misspell:
      locale: US

  exclusions:
    rules:
      # Test files: allow dot imports, unused params, etc.
      - path: _test\.go
        linters:
          - errcheck
          - gocritic

      # Allow fmt.Fprint* to stderr without checking errors
      - linters:
          - errcheck
        text: "fmt\\.Fprint"

output:
  max-issues-per-linter: 50
  max-same-issues: 5
