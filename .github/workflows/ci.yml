name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: ['1.26']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Run unit tests with race detection
        run: go test -v -race -count=1 -parallel 8 -coverprofile=coverage.out ./...
      - name: Check coverage
        if: matrix.os == 'ubuntu-latest'
        run: |
          total=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${total}%"
          # Fail if coverage drops below 70% (relaxed for initial development)
          awk -v cov="$total" 'BEGIN { if (cov+0 < 70) { print "Coverage below 70%!"; exit 1 } }'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w -X github.com/seangalliher/d365-erp-cli/cmd.version=ci -X github.com/seangalliher/d365-erp-cli/cmd.commit=${{ github.sha }} -X github.com/seangalliher/d365-erp-cli/cmd.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o d365${ext} .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: d365-${{ matrix.goos }}-${{ matrix.goarch }}
          path: d365*

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    env:
      D365_TEST_URL: ${{ secrets.D365_SANDBOX_URL }}
      D365_TEST_CLIENT_ID: ${{ secrets.D365_CLIENT_ID }}
      D365_TEST_CLIENT_SECRET: ${{ secrets.D365_CLIENT_SECRET }}
      D365_TEST_TENANT: ${{ secrets.D365_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run integration tests
        if: env.D365_TEST_URL != ''
        run: go test -v -tags=integration -parallel 4 -timeout 300s ./test/integration/...
