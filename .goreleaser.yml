version: 2

project_name: d365

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: d365
    main: .
    binary: d365
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/seangalliher/d365-erp-cli/cmd.version={{.Version}}
      - -X github.com/seangalliher/d365-erp-cli/cmd.commit={{.Commit}}
      - -X github.com/seangalliher/d365-erp-cli/cmd.date={{.Date}}

archives:
  - id: default
    ids:
      - d365
    format: tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: seangalliher
    name: d365-erp-cli
  draft: false
  prerelease: auto

nfpms:
  - id: packages
    ids:
      - d365
    maintainer: Sean Galliher <seangalliher@users.noreply.github.com>
    vendor: seangalliher
    homepage: https://github.com/seangalliher/d365-erp-cli
    description: CLI for Dynamics 365 Finance & Operations
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin

scoops:
  - name: d365
    repository:
      owner: seangalliher
      name: scoop-d365
    homepage: https://github.com/seangalliher/d365-erp-cli
    description: CLI for Dynamics 365 Finance & Operations
    license: MIT
